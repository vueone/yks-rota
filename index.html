<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YKS Rota — Çalışma Programı</title>
<style>
  :root{
    --ink:#1c1b19;
    --paper:#f6f3ec;
    --paper-2:#efe9db;
    --line:#d9d2c0;
    --accent:#b3502b;       /* terracotta - mat/fizik */
    --accent-2:#3d6b5c;     /* yeşil - kimya/biyo */
    --accent-3:#6b5b95;     /* mor - edebiyat/tarih */
    --accent-4:#8a7960;     /* kahve - coğrafya/din/felsefe */
    --muted:#8b8478;
    --good:#3d6b5c;
    --bad:#b3502b;
    --mid:#c9a13b;
    --radius:10px;
    --shadow:0 1px 2px rgba(28,27,25,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Iowan Old Style','Palatino Linotype',Georgia,serif;
    line-height:1.5;
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 80px;}
  header.top{
    display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:2px solid var(--ink);
    padding-bottom:10px;margin-bottom:18px;
  }
  header.top h1{
    font-size:1.5rem;margin:0;letter-spacing:.02em;font-weight:700;
  }
  header.top .daycount{
    font-family:'Courier New',monospace;font-size:.85rem;color:var(--muted);
    text-align:right;
  }
  .countdown-banner{
    background:var(--ink);color:var(--paper);
    border-radius:var(--radius);
    padding:14px 16px;margin-bottom:18px;
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:8px;
  }
  .countdown-banner .num{font-size:1.8rem;font-weight:700;font-family:'Courier New',monospace;}
  .countdown-banner .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#cfc7b3;}
  .tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--line);}
  .tab{
    padding:8px 14px;cursor:pointer;font-size:.85rem;color:var(--muted);
    border-bottom:2px solid transparent;user-select:none;
  }
  .tab.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:600;}
  .panel{display:none;}
  .panel.active{display:block;}

  .card{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;margin-bottom:12px;
    box-shadow:var(--shadow);
  }
  .card h3{margin:0 0 4px;font-size:1rem;}
  .card .meta{font-size:.78rem;color:var(--muted);margin-bottom:8px;}
  .block{
    display:flex;align-items:flex-start;gap:10px;
    padding:10px 0;border-top:1px solid var(--line);
  }
  .block:first-of-type{border-top:none;}
  .block .time{
    font-family:'Courier New',monospace;font-size:.78rem;color:var(--muted);
    min-width:78px;padding-top:2px;
  }
  .block .body{flex:1;}
  .block .subj{font-weight:600;font-size:.95rem;}
  .block .desc{font-size:.85rem;color:#4a463e;margin-top:2px;}
  .block .source{font-size:.76rem;color:var(--muted);margin-top:3px;font-style:italic;}
  .tag{
    display:inline-block;font-size:.68rem;padding:2px 7px;border-radius:20px;
    margin-right:5px;color:#fff;letter-spacing:.02em;
  }
  .tag.p1{background:var(--accent);}
  .tag.p2{background:var(--accent-2);}
  .tag.p3{background:var(--accent-3);}
  .tag.p4{background:var(--accent-4);}
  .tag.exam{background:#9b2226;}
  .tag.break{background:var(--muted);}
  .statusbtns{display:flex;gap:6px;margin-top:8px;}
  .statusbtns button{
    flex:1;border:1px solid var(--line);background:#fff;color:var(--ink);
    border-radius:6px;padding:6px 4px;font-size:.74rem;cursor:pointer;font-family:inherit;
  }
  .statusbtns button.sel-done{background:var(--good);color:#fff;border-color:var(--good);}
  .statusbtns button.sel-partial{background:var(--mid);color:#fff;border-color:var(--mid);}
  .statusbtns button.sel-skip{background:var(--bad);color:#fff;border-color:var(--bad);}

  .actionbar{display:flex;gap:8px;margin:18px 0;}
  .actionbar button{
    flex:1;padding:11px;border-radius:var(--radius);border:1px solid var(--ink);
    background:var(--ink);color:var(--paper);font-family:inherit;font-size:.88rem;
    cursor:pointer;
  }
  .actionbar button.secondary{background:transparent;color:var(--ink);}

  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .statbox{
    background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px;text-align:center;
  }
  .statbox .v{font-size:1.5rem;font-weight:700;font-family:'Courier New',monospace;}
  .statbox .l{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}

  .barrow{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.82rem;}
  .barrow .lbl{min-width:120px;color:#4a463e;}
  .barouter{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden;}
  .barinner{height:100%;border-radius:4px;}

  textarea, select, input[type=number]{
    font-family:inherit;border:1px solid var(--line);border-radius:6px;padding:8px;
    background:#fff;color:var(--ink);width:100%;
  }
  label.fieldlbl{font-size:.78rem;color:var(--muted);display:block;margin:10px 0 4px;}
  .small{font-size:.78rem;color:var(--muted);}
  .empty{text-align:center;color:var(--muted);padding:30px 0;font-size:.9rem;}
  .footer-note{font-size:.72rem;color:var(--muted);text-align:center;margin-top:30px;}

  .log-entry{border-top:1px solid var(--line);padding:8px 0;font-size:.82rem;}
  .log-entry:first-child{border-top:none;}
  .log-entry .d{color:var(--muted);font-family:'Courier New',monospace;font-size:.72rem;}

  button.linklike{
    background:none;border:none;color:var(--accent);text-decoration:underline;
    cursor:pointer;font-family:inherit;font-size:.82rem;padding:0;
  }
  details summary{cursor:pointer;font-size:.85rem;color:var(--muted);margin:8px 0;}
  textarea#exportArea{height:140px;font-size:.7rem;font-family:'Courier New',monospace;}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>YKS Rota</h1>
    <div class="daycount" id="topDayCount">—</div>
  </header>

  <div class="countdown-banner">
    <div>
      <div class="num" id="examCountdown">—</div>
      <div class="lbl">Sınava kalan gün</div>
    </div>
    <div style="text-align:right">
      <div class="num" id="studyDayNum">—</div>
      <div class="lbl">Çalışma günün</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-panel="today">Bugün</div>
    <div class="tab" data-panel="progress">İlerleme</div>
    <div class="tab" data-panel="log">Geçmiş</div>
    <div class="tab" data-panel="settings">Ayarlar</div>
  </div>

  <!-- TODAY -->
  <div class="panel active" id="panel-today"></div>

  <!-- PROGRESS -->
  <div class="panel" id="panel-progress"></div>

  <!-- LOG -->
  <div class="panel" id="panel-log"></div>

  <!-- SETTINGS -->
  <div class="panel" id="panel-settings"></div>

  <div class="footer-note">Tüm veriler sadece bu cihazda, tarayıcının localStorage'ında tutulur. Sunucuya hiçbir şey gönderilmez.</div>
</div>

<script src="app.js"></script>
</body>
</html>
